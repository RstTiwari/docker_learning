name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 120s
          command_timeout: 20m

          script: |
            set -euxo pipefail

            echo "========== SERVER INFO =========="
            whoami
            hostname
            pwd
            date

            echo "========== GO TO PROJECT =========="
            cd /var/services/docker_learning

            echo "========== CURRENT COMMIT =========="
            git log --oneline -1

            echo "========== FETCH =========="
            git fetch origin

            echo "========== RESET TO LATEST =========="
            git reset --hard origin/master

            echo "========== UPDATED COMMIT =========="
            git log --oneline -1

            echo "========== DOCKER VERSION =========="
            docker --version
            docker-compose --version

            echo "========== CURRENT CONTAINERS =========="
            docker ps -a

            echo "========== STOP =========="
            docker-compose down || true

            echo "========== BUILD =========="
            docker-compose build --no-cache

            echo "========== START =========="
            docker-compose up -d --force-recreate

            echo "========== RUNNING CONTAINERS =========="
            docker ps

            echo "========== APPLICATION LOGS =========="
            docker-compose logs --tail=100

            echo "========== CLEANUP =========="
            docker image prune -f

            echo "========== DEPLOYMENT SUCCESSFUL =========="